# Production Docker Compose
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Bu dosya docker-compose.yml üzerine override olarak çalışır.
# DB ve Redis portları dışarıya kapatılır, SSL reverse proxy eklenir.

services:
  # ── PostgreSQL: Portları kapat ─────────────────────────────────
  postgres:
    ports: !override []
    environment:
      POSTGRES_DB: havesmashed
      POSTGRES_USER: havesmashed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis: Portları kapat ──────────────────────────────────────
  redis:
    ports: !override []
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backend ────────────────────────────────────────────────────
  backend:
    ports: !override []
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://havesmashed:${POSTGRES_PASSWORD}@postgres:5432/havesmashed
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-604800}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      HOST: 0.0.0.0
      PORT: "3000"
      RUST_LOG: havesmashed_backend=info,tower_http=info
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend: SSL reverse proxy üzerinden servis edilir ────────
  frontend:
    ports: !override []

  # ── Admin Panel: SSL reverse proxy üzerinden servis edilir ─────
  admin:
    ports: !override []

  # ── Nginx Reverse Proxy (SSL Termination) ──────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - admin
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (Let's Encrypt SSL) ────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot-webroot:
