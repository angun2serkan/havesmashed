services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: havesmashed
      POSTGRES_USER: havesmashed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U havesmashed"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (Rust API) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://havesmashed:${POSTGRES_PASSWORD:-changeme}@postgres:5432/havesmashed
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_random_secret_at_least_32_chars}
      JWT_EXPIRY: ${JWT_EXPIRY:-604800}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change_me_to_a_random_admin_key}
      HOST: 0.0.0.0
      PORT: "3000"
      RUST_LOG: havesmashed_backend=info,tower_http=info
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # ── Admin Panel ─────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
  uploads:
